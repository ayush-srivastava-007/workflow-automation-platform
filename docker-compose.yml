services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ayush123
      POSTGRES_DB: workflow_automation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workflow_automation"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: apply Prisma migrations, then exit. Uses the builder stage
  # because the production image prunes the Prisma CLI.
  migrate:
    build:
      context: .
      target: builder
    command: ["npx", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: postgresql://postgres:ayush123@postgres:5432/workflow_automation
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      target: runner
    restart: unless-stopped
    command: ["node", "src/server.js"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:ayush123@postgres:5432/workflow_automation
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      target: runner
    restart: unless-stopped
    command: ["node", "src/worker.js"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:ayush123@postgres:5432/workflow_automation
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
